name: ANAL does not accept pull requests

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "ANAL does not accept pull requests. This is not a bug.",
              "",
              "All changes flow in one direction. There is no pulling.",
              "Data arrives, you process it, it exits. You do not go looking for it.",
              "",
              "Patches are submitted by email. Issues are raised by insertion into the tracker.",
              "The RFC PASSAGE process governs all significant changes.",
              "",
              "See the [contributing policy](https://github.com/anal-lang/anal#contributing) for details.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: "closed",
            });
